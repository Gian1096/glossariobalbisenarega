---
layout: default
title: Contatti
---
<div class="Contenuto-Scheda" style="max-width: 800px; margin: 0 auto;">
    <div style="text-align: right; margin-bottom: 20px;">
        <span onclick="switchLanguage('it')" style="cursor:pointer; font-weight:bold;">IT</span> | 
        <span onclick="switchLanguage('fr')" style="cursor:pointer;">FR</span>
    </div>

    <h1 id="txt-contatti-titolo">Contatti e Segnalazioni</h1>
    <p id="txt-contatti-intro">Compila il modulo sottostante per inviare una segnalazione, una proposta terminologica o per richiedere informazioni sul progetto.</p>

    <form action="https://formsubmit.co/giovanni.mantegazza@edu.unige.it" method="POST">
        <label id="lbl-nome">Nome e Cognome</label><br>
        <input type="text" name="name" required style="width:100%; padding:10px; margin-bottom:15px;"><br>
        
        <label id="lbl-email">Indirizzo Email</label><br>
        <input type="email" name="email" required style="width:100%; padding:10px; margin-bottom:15px;"><br>
        
        <label id="lbl-messaggio">Messaggio</label><br>
        <textarea name="message" required style="width:100%; height:150px; padding:10px; margin-bottom:15px;"></textarea><br>
        
        <button type="submit" id="btn-invia" style="background:#1a365d; color:white; padding:12px 24px; border:none; cursor:pointer;">Invia Messaggio</button>
    </form>
</div>

<script>
    const traduzioni = {
        it: {
            titolo: "Contatti e Segnalazioni",
            intro: "Compila il modulo sottostante per inviare una segnalazione, una proposta terminologica o per richiedere informazioni sul progetto.",
            nome: "Nome e Cognome",
            email: "Indirizzo Email",
            messaggio: "Messaggio",
            invia: "Invia Messaggio"
        },
        fr: {
            titolo: "Contacts et Retours",
            intro: "Remplissez le formulaire ci-dessous pour envoyer un signalement, une proposition terminologique ou demander des informations sur le projet.",
            nome: "Nom et Prénom",
            email: "Adresse E-mail",
            messaggio: "Message",
            invia: "Envoyer le Message"
        }
    };

    function switchLanguage(lang) {
        document.getElementById('txt-contatti-titolo').innerText = traduzioni[lang].titolo;
        document.getElementById('txt-contatti-intro').innerText = traduzioni[lang].intro;
        document.getElementById('lbl-nome').innerText = traduzioni[lang].nome;
        document.getElementById('lbl-email').innerText = traduzioni[lang].email;
        document.getElementById('lbl-messaggio').innerText = traduzioni[lang].messaggio;
        document.getElementById('btn-invia').innerText = traduzioni[lang].invia;
    }
</script>
