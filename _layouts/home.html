<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | Glossario Rolli</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
            color: #2d3748;
            font-size: 1.15em;
            text-align: justify;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            background-color: #eef2f7 !important;
        }

        .Home-Container {
            background: #ffffff;
            border-top: 6px solid #1a365d;
            padding: 40px;
            max-width: 1500px; 
            margin: 0 auto; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* --- TESTATA BLU DI ATENEO --- */
        .Header-Podio { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-end; 
            border-bottom: 3px solid #b91c1c; /* Rosso UniGe */
            padding: 25px 40px; 
            margin: -40px -40px 35px -40px; 
            gap: 15px; 
            background-color: #1a365d !important; 
            box-shadow: inset 0 -10px 20px rgba(0,0,0,0.15);
        }

        .Header-Podio img {
            max-height: 95px;
            width: auto;
            opacity: 1;
        }

        .Contenuto-Home {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px 0;
        }

        .Footer-Curatore {
            margin-top: 60px;
            padding-top: 20px;
            border-top: 1px dashed #e2e8f0;
            text-align: right;
            font-size: 0.85em;
            color: #718096;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="Home-Container">
        
        <div class="Header-Podio">
    <div class="Podio-Dipartimento"><img src="{{ site.baseurl }}/assets/Logo_DLCM_UniGe_white.svg"></div>
    <div class="Podio-Ateneo"><img src="{{ site.baseurl }}/assets/logo_verticale_BIANCO.svg"></div>
    <div class="Podio-Dottorato"><img src="{{ site.baseurl }}/assets/Logo_PHD_DH_Monocromo_Bianco.svg"></div>
</div>

        <div class="Contenuto-Home">
            {{ content }}
        </div> 
        
        <footer class="Footer-Curatore">Portale a cura di: Giovanni Mantegazza (Università degli Studi di Genova)</footer>
    </div> 

</body>
</html>
